<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kintrest – You're Offline</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,600&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #FFF6F0;
            color: #2B1F1F;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
        }

        .wrap {
            max-width: 340px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: #C0213A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 2.2rem;
            font-weight: 700;
            color: #fff;
            margin: 0 auto 28px;
            box-shadow: 0 8px 28px rgba(192, 33, 58, .3);
            animation: pulse 2.5s ease infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.06);
            }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: #2B1F1F;
        }

        h1 em {
            color: #C0213A;
            font-style: italic;
        }

        p {
            font-size: .95rem;
            color: #9B7272;
            line-height: 1.65;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-block;
            padding: 13px 32px;
            background: #C0213A;
            color: #fff;
            border-radius: 999px;
            text-decoration: none;
            font-weight: 700;
            font-size: .95rem;
            box-shadow: 0 4px 16px rgba(192, 33, 58, .3);
            transition: all .2s;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
        }

        .btn:hover {
            background: #8B0F24;
            transform: translateY(-2px);
        }

        .peach {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 28px;
            font-size: .8rem;
            color: #F4A07A;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <div class="icon">K</div>
        <h1>You're <em>offline</em></h1>
        <p>Kintrest needs an internet connection to load beautiful images. Connect to WiFi or mobile data and try again.
        </p>
        <button class="btn" onclick="window.location.reload()">Try again →</button>
        <div class="peach">🍒 Kintrest &nbsp;·&nbsp; 🍑 Visual Discovery</div>
    </div>
</body>

</html>
